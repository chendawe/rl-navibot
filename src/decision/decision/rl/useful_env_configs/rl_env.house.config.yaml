# ==================== 机器人本体配置 ====================
bot:
  name: "waffle"             # 机器人实例名 (burger / waffle / waffle_pi)
  
  # --- 激光雷达 ---
  laser_range_max: 3.5           # 激光最大有效距离
  laser_beams_num: 24            # 降采样后光束数 (360 -> 24)
  laser_noise_threshold: 0.12
  # --- 动作空间 ---
  # lin_vel_max: 0.22              # 最大线速度
  # ang_vel_max: 1.5               # 最大角速度
  lin_vel_max: 0.26              # 最大线速度
  ang_vel_max: 1.5               # 最大角速度

  # --- 碰撞与安全 (与底盘尺寸强相关) ---
  # TurtleBot3 Burger: 直径约 0.178 米，半径约 0.09 米。
  # TurtleBot3 Waffle: 直径约 0.281 米，半径约 0.14 米。
  # A. 碰撞终止阈值 (proximity_to_collision_threshold)
  # 如果是 Burger: 建议设为 0.12 ~ 0.15 （即离墙 3~6 厘米算撞）。
  # 如果是 Waffle: 建议设为 0.18 ~ 0.20。
  # B. 接近惩罚阈值 (proximity_to_be_safe_min)
  # 如果是 Burger: 建议设为 0.20 ~ 0.25 （即离墙 11~16 厘米开始扣分）。
  # 如果是 Waffle: 建议设为 0.28 ~ 0.35。
  proximity_to_collision_threshold: 0.25
  proximity_to_be_safe_min: 0.45

  # --- 物理速度极限 (内部约束，非 RL 直接输出) ---
  lin_acc_physics_max: 2.0
  ang_vel_imu_physics_max: 3.0
  # lin_vel_stuck_threshold: 0.12
  lin_vel_stuck_threshold: 0.04

# ==================== 世界与任务配置 ====================
world:
  name: "ttb3_house"       # Gazebo 世界名

  # --- Episode 控制 ---
  episode_steps_max: 5000        # 单 episode 最大步数
  step_duration: 0.1             # 每步仿真时间

  # --- 目标生成 ---
  dist_to_goal_threshold: 0.3    # 到达目标的距离判定
  dist_to_goal_gen_min: 5.0      # 生成目标的最小距离
  dist_to_goal_clip_norm: 5.0    # 目标距离归一化上限

  # --- 安全区域采样 (嵌套字典：大区 -> 子点) ---
  safe_zones:
    zone_trash_room:
      - {cx:  1.2, cy:  1.5,  r: 0.4}
    zone_coffee_table:
      - {cx:  6.5, cy: -4.2, r: 0.9}
    zone_bookshelf_red:
      - {cx: -6.0, cy:  2.0, r: 0.8}
    zone_bookshelf_wood:
      - {cx:  7.5, cy: -3.0, r: 0.9}
    zone_center_table:
      - {cx: -2.6, cy:  2.5, r: 0.6}
    zone_iron_table:
      - {cx:  4.9, cy:  3.0, r: 1.0}
    zone_outdoor_front:
      - {cx: -4.0, cy: -3.0, r: 2.0}
      - {cx:  2.0, cy: -4.0, r: 2.0}
      - {cx: -9.0, cy: -7.0, r: 1.0}
      - {cx:  6.0, cy: -6.0, r: 0.8}
    zone_outdoor_right:
      - {"cx":  9, "cy":  8, "r": 1}
      - {cx:  9.0, cy: -4.0, r: 1.0}
    zone_outdoor_left:
      - {"cx":  -9, "cy":  8, "r": 1}
      - {cx: -9.0, cy: -3.0, r: 1.0}

#         # # 屋外：屋后
#         # {"cx":  -4, "cy":  8, "r": 2},
