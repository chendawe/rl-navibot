# ==================== 机器人本体配置 ====================
robot:
  name: "waffle"                    # 机器人实例名
  laser_range_max: 3.5              # 激光最大有效距离
  laser_beams_num: 24               # 降采样后光束数 (360 -> 24)
  laser_noise_threshold: 0.12
  lin_vel_max: 0.22                 # 最大线速度
  ang_vel_max: 1.5                  # 最大角速度
  proximity_to_collision_threshold: 0.15  # 碰撞距离阈值
  proximity_to_be_safe_min: 0.35    # 安全距离内惩罚阈值
  lin_acc_physics_max: 2.0          # 物理线加速度上限
  ang_vel_imu_physics_max: 3.0      # 物理角速度上限
  lin_vel_stuck_threshold: 0.12     # 机器人卡住判断阈值

# ==================== 世界与任务配置 ====================
world:
  name: "ttb3_world"                # Gazebo 世界名
  episode_steps_max: 500            # 单 episode 最大步数
  step_duration: 0.1                # 每步仿真时间
  dist_to_goal_threshold: 0.3       # 到达目标的距离判定
  dist_to_goal_gen_min: 1.0         # 生成目标的最小距离
  dist_to_goal_clip_norm: 5.0       # 目标距离归一化上限
  safe_zones:
    zone_arena_bottom:
      - {cx: -0.5, cy: -1.75, r: 0.75}
      - {cx:  0.5, cy: -1.75, r: 0.75}
    zone_arena_left:
      - {cx: -2.0, cy:  0.0,  r: 0.6}
      - {cx: -1.75, cy:  0.75, r: 0.6}
      - {cx: -1.75, cy: -0.75, r: 0.6}
    zone_arena_right:
      - {cx: 1.75, cy:  0.75, r: 0.6}
      - {cx: 1.75, cy: -0.75, r: 0.6}
    zone_arena_top:
      - {cx: -0.5, cy: 1.75, r: 0.75}
      - {cx:  0.5, cy: 1.75, r: 0.75}
    zone_pillars:
      - {cx: -0.5, cy: -0.5, r: 0.6}
      - {cx:  0.5, cy: -0.5, r: 0.6}
      - {cx: -0.5, cy:  0.5, r: 0.6}
      - {cx:  0.5, cy:  0.5, r: 0.6}

# ==================== 奖励函数配置 ====================
reward:
  reward_at_goal: 300.0
  penalty_at_collision: -300.0
  reward_factor_approaching_goal: 20.0
  penalty_elapsing_time: -0.2
  penalty_stuck: -0.05
  reward_good_orientation: 2.0
  penalty_factor_in_safe_proximity: -5.0
  penalty_action_smoothness: -0.5
  penalty_instability: -2.0