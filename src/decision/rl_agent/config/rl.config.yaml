environment:
  # --- 激光雷达 ---
  laser_range_max: 3.5          # 激光最大有效距离
  laser_beams_num: 24           # 降采样后光束数 (360 -> 24)

  # --- 动作空间 ---
  lin_vel_max: 0.22             # 最大线速度
  ang_vel_max: 1.5              # 最大角速度

  # --- Episode 控制 ---
  episode_steps_max: 500        # 单 episode 最大步数
  step_duration: 0.1            # 每步仿真时间

  # --- 目标 ---
  dist_to_goal_threshold: 0.3           # 到达目标的距离判定
  dist_to_goal_gen_min: 1.0
  dist_to_goal_clip_norm: 5.0            # 目标距离归一化上限

  # --- 碰撞 ---
  proximity_to_collision_threshold: 0.11     # 碰撞距离阈值 (小于此值判碰撞)
  proximity_to_be_safe_min: 0.30         # 接近障碍物时额外惩罚

  # --- 物理速度极限 ---
  lin_acc_physics_max: 2.0
  ang_vel_imu_physics_max: 3.0

  lin_vel_stuck_threshold: 0.12

reward:
  # --- 奖励权重 ---
  reward_at_goal: 300.0            # 到达目标
  penalty_at_collision: -300.0      # 碰撞
  reward_factor_approaching_goal: 5.0        # 靠近目标的比例系数
  penalty_elapsing_time: -0.5             # 每步时间惩罚
  penalty_stuck: -0.1            # 卡住惩罚
  reward_good_orientation: 2.0          # 好方向奖励
  penalty_in_safe_proximity: -1.0           # 安全距离内惩罚
  penalty_action_smoothness: -0.5
  
train:
  algorithm: "SAC"
  learning_rate: 0.0003
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01                # 熵系数，鼓励探索
  vf_coef: 0.5
  max_grad_norm: 0.5
  net_arch: [256, 256]          # 策略/价值网络结构

  total_timesteps: 500000
  save_freq: 10000
  save_dir: "./tb3_rl_models/"
  tensorboard_log: "./tb3_rl_logs/"